<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIXEL GENERATOR</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="/index.js"></script>
  </head>
  <body>
    <div><h1 class="">PIXEL GENERATOR</h1></div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" />
      <p>
        <strong>Add Picture Here</strong> or Choose From Divace.<br />
        <small>JPG, PNG, WEBP · File up to 5 MB</small>
      </p>
      <button class="button" type="button">Pixel It</button>
    </div>
    <canvas id="myCanvas" width="800" height="800"></canvas>
  </body>
</html>
